version: 1.2.4
cache: true

webSearch:
  searchProvider: tavily
  scraperProvider: tavily
  rerankerType: jina
  tavilyApiKey: "${TAVILY_API_KEY}"
  jinaApiKey: "${JINA_API_KEY}"

mcpServers:
  notion:
    type: streamable-http
    url: https://mcp.notion.com/mcp

  sentry:
    type: streamable-http
    url: https://mcp.sentry.dev/mcp

  railway:
    type: streamable-http
    url: https://mcp.railway.com

  slack:
    type: streamable-http
    url: https://mcp.slack.com/mcp

  linear:
    type: sse
    url: https://mcp.linear.app/sse

  larm:
    type: streamable-http
    url: https://app.larm.dev/mcp

  posthog:
    type: streamable-http
    url: https://mcp.posthog.com/mcp
    headers:
      Authorization: "Bearer ${POSTHOG_PERSONAL_API_KEY}"

  grafana:
    type: stdio
    command: uvx
    args:
      - mcp-grafana
    env:
      GRAFANA_URL: "${GRAFANA_URL}"
      GRAFANA_SERVICE_ACCOUNT_TOKEN: "${GRAFANA_SERVICE_ACCOUNT_TOKEN}"

  fetch:
    type: stdio
    command: uvx
    args:
      - mcp-server-fetch

endpoints:
  custom:
    - name: "OMLX"
      apiKey: "monkey"
      baseURL: "${OMLX_BASE_URL}"
      models:
        default: ["Qwen3.6-35B-A3B-4bit"]
        fetch: true
      titleConvo: true
      titleModel: "Qwen3.6-35B-A3B-4bit"
      modelDisplayLabel: "Qwen3.6 35B (Mac)"

    - name: "OpenRouter"
      apiKey: "${OPENROUTER_KEY}"
      baseURL: "https://openrouter.ai/api/v1"
      models:
        default:
          - "meta-llama/llama-3-70b-instruct"
        fetch: true
      titleConvo: true
      titleModel: "meta-llama/llama-3-70b-instruct"
      dropParams:
        - "stop"

    - name: "Fireworks"
      apiKey: "${FIREWORKS_API_KEY}"
      baseURL: "https://api.fireworks.ai/inference/v1"
      models:
        default:
          - "accounts/fireworks/models/mixtral-8x7b-instruct"
        fetch: true
      titleConvo: true
      titleModel: "accounts/fireworks/models/llama-v2-7b-chat"
      summarize: false
      summaryModel: "accounts/fireworks/models/llama-v2-7b-chat"
      dropParams:
        - "user"

    - name: "Mistral"
      apiKey: "${MISTRAL_API_KEY}"
      baseURL: "https://api.mistral.ai/v1"
      models:
        default:
          - "mistral-tiny"
        fetch: true
      titleConvo: true
      titleModel: "mistral-tiny"
      dropParams:
        - "stop"
        - "user"
        - "frequency_penalty"
        - "presence_penalty"

    - name: "Groq"
      apiKey: "${GROQ_API_KEY}"
      baseURL: "https://api.groq.com/openai/v1/"
      models:
        default:
          - "llama3-70b-8192"
        fetch: true
      titleConvo: true
      titleModel: "mixtral-8x7b-32768"
